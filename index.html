<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#F3F4F6] flex items-center justify-center h-screen">

<div class="bg-white w-[360px] p-8 rounded-xl shadow">

<div class="text-center mb-6">

<img
src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
class="w-12 mx-auto mb-2"
/>

<h1 class="font-semibold text-lg">
GitHub Issues Tracker
</h1>

<p class="text-gray-500 text-sm">
Sign in to manage your issues
</p>

</div>

<form id="loginForm" class="space-y-3">

<div>

<label class="text-sm">Username</label>

<input
id="username"
class="border w-full p-2 rounded mt-1"
placeholder="Enter Username"
/>

<p class="text-xs text-blue-600 mt-1 cursor-pointer">
Default: admin
</p>

</div>

<div>

<label class="text-sm">Password</label>

<input
id="password"
type="password"
class="border w-full p-2 rounded mt-1"
placeholder="Enter Password"
/>

<p class="text-xs text-blue-600 mt-1 cursor-pointer">
Default: admin123
</p>

</div>

<button
class="w-full bg-[#5B21F3] text-white py-2 rounded mt-2">
Sign In
</button>

</form>

<p class="text-center text-xs text-gray-400 mt-4">
OR
</p>

<p class="text-center text-xs text-gray-500">
Demo Credentials
</p>

<div class="bg-gray-100 text-center p-2 rounded mt-2 text-sm">

Username: admin<br>
Password: admin123

</div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault()

const username =
document.getElementById("username").value

const password =
document.getElementById("password").value

if(username==="admin" && password==="admin123"){

window.location.href="dashbord.html"

}else{

alert("Invalid credentials")

}

})

</script>

</body>
</html>git add .
