<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 font-sans">

<div class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">

<h1 class="font-bold text-xl flex items-center gap-2">
<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-6">
GitHub Issues Tracker
</h1>

<div class="flex items-center gap-3">

<input
id="searchInput"
type="text"
placeholder="Search issue..."
class="border rounded-lg px-4 py-2 w-60 focus:outline-none focus:ring-2 focus:ring-purple-500"
/>

<button
onclick="searchIssues()"
class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg">
Search
</button>

<button
class="bg-indigo-600 text-white px-4 py-2 rounded-lg">
+ New Issue
</button>

</div>

</div>


<div class="p-8 max-w-7xl mx-auto">

<div class="flex gap-2 mb-6 bg-white p-2 rounded-lg w-fit shadow">

<button
onclick="changeTab('all',this)"
class="tabBtn bg-purple-600 text-white px-5 py-2 rounded-md">
All
</button>

<button
onclick="changeTab('open',this)"
class="tabBtn px-5 py-2 rounded-md text-gray-600 hover:bg-gray-100">
Open
</button>

<button
onclick="changeTab('closed',this)"
class="tabBtn px-5 py-2 rounded-md text-gray-600 hover:bg-gray-100">
Closed
</button>

</div>


<section class="flex justify-between">

<div class="mb-2 flex gap-2">

<div>
<img src="/B13-A5-Github-Issue-Tracker/assets/Aperture.png">
</div>

<p class="text-gray-600">
<span id="issueCount" class="font-bold text-purple-600"></span>
Issues
</p>

</div>

<div class="flex items-center gap-4 text-sm">

<span class="flex items-center gap-2">
<div class="w-3 h-3 bg-green-500 rounded-full"></div>
Open
</span>

<span class="flex items-center gap-2">
<div class="w-3 h-3 bg-purple-500 rounded-full"></div>
Closed
</span>

</div>

</section>

<p class="font-bold mb-2">Track and manage your project issues</p>


<div
id="spinner"
class="text-center text-xl hidden">
Loading...
</div>


<div
id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
</div>

</div>


<div
id="modal"
class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

<div class="bg-white p-6 rounded-xl w-96 shadow-lg">

<h2 id="modalTitle" class="font-bold text-xl mb-2"></h2>

<p id="modalDesc" class="text-gray-600"></p>

<p id="modalAuthor" class="mt-4 text-sm text-gray-500"></p>

<div class="flex justify-end mt-6">

<button
onclick="closeModal()"
class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-lg">
Close
</button>

</div>

</div>

</div>

<script src="dashbord.js"></script>

</body>
</html>
